<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Украшения · Каталог</title>
<style>
  :root{
    --bg:#ffffff; --ink:#141414; --muted:#8a8a8a; --line:#ececec;
    --accent:#1f7a54; --accent-soft:#eef6f1; --card:#fff; --shadow:0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;
    color:var(--ink); background:var(--bg); -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  .wrap{max-width:1240px;margin:0 auto;padding:0 20px}

  header{padding:46px 0 26px;border-bottom:1px solid var(--line)}
  .brand{font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);margin:0 0 14px}
  h1{font-size:clamp(30px,5vw,46px);font-weight:600;letter-spacing:-.01em;margin:0}
  .sub{color:var(--muted);margin:12px 0 0;font-size:15px;max-width:640px}

  .controls{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:16px 0}
  .controls .wrap{display:flex;flex-wrap:wrap;gap:14px;align-items:center}
  .filters{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:9px 15px;border-radius:999px;font-size:13.5px;cursor:pointer;
    transition:.15s;white-space:nowrap;font-weight:500}
  .chip:hover{border-color:#cfcfcf}
  .chip .n{color:var(--muted);margin-left:6px;font-size:12px}
  .chip.active{background:var(--ink);border-color:var(--ink);color:#fff}
  .chip.active .n{color:rgba(255,255,255,.6)}
  .spacer{flex:1 1 auto}
  .search{position:relative;flex:0 1 260px;min-width:180px}
  .search input{width:100%;padding:10px 14px 10px 38px;border:1px solid var(--line);
    border-radius:999px;font-size:14px;outline:none;transition:.15s;font-family:inherit}
  .search input:focus{border-color:var(--accent)}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.45}
  select{padding:10px 14px;border:1px solid var(--line);border-radius:999px;
    font-size:14px;background:#fff;cursor:pointer;outline:none;font-family:inherit;color:var(--ink)}
  select:focus{border-color:var(--accent)}

  .meta{color:var(--muted);font-size:13px;padding:18px 0 4px}
  .meta b{color:var(--ink);font-weight:600}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:22px 20px;padding:14px 0 70px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    overflow:hidden;display:flex;flex-direction:column;transition:.18s;box-shadow:var(--shadow)}
  .card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.09);border-color:#e2e2e2}
  .ph{position:relative;aspect-ratio:1/1;background:#f6f6f6;overflow:hidden}
  .ph img{width:100%;height:100%;object-fit:cover;display:block;transition:.4s}
  .card:hover .ph img{transform:scale(1.04)}
  .badge{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.94);
    backdrop-filter:blur(4px);color:var(--ink);font-size:11px;font-weight:600;
    letter-spacing:.02em;padding:5px 10px;border-radius:999px}
  .body{padding:14px 15px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
  .price{font-size:19px;font-weight:600;letter-spacing:-.01em}
  .price span{font-size:14px;font-weight:500;color:var(--muted)}
  .desc{font-size:13.5px;color:#3d3d3d;margin:0}
  .empty{text-align:center;color:var(--muted);padding:80px 0;font-size:15px}

  footer{border-top:1px solid var(--line);padding:26px 0 60px;color:var(--muted);font-size:12.5px}

  @media(max-width:600px){
    .grid{grid-template-columns:repeat(2,1fr);gap:14px}
    header{padding:34px 0 20px}
    .search{flex-basis:100%;order:5}
    .body{padding:11px 12px 13px}
    .price{font-size:16px}
    .desc{font-size:12.5px}
    .wrap{padding:0 14px}
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <p class="brand">bb20a · beauty bar</p>
    <h1>Украшения</h1>
    <p class="sub">Каталог из 210 позиций от трёх поставщиков. Фото · цена · описание. Фильтр по поставщику, поиск и сортировка по цене.</p>
  </div>
</header>

<div class="controls">
  <div class="wrap">
    <div class="filters" id="filters"></div>
    <div class="spacer"></div>
    <label class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="Поиск по описанию…" autocomplete="off">
    </label>
    <select id="sort">
      <option value="default">По умолчанию</option>
      <option value="asc">Цена ↑</option>
      <option value="desc">Цена ↓</option>
    </select>
  </div>
</div>

<div class="wrap">
  <div class="meta" id="meta"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">Ничего не найдено — измените запрос или фильтр.</div>
</div>

<footer>
  <div class="wrap">Каталог украшений · собран автоматически · фото хранятся на Google&nbsp;Drive.</div>
</footer>

const grid=document.getElementById('grid');
const emptyEl=document.getElementById('empty');
const metaEl=document.getElementById('meta');

function render(){
  let list = ITEMS.filter(i=>
    (state.sup==='all'||i.sup===state.sup) &&
    (!state.q || i.desc.toLowerCase().includes(state.q) || i.supName.toLowerCase().includes(state.q))
  );
  if(state.sort==='asc') list=[...list].sort((a,b)=>a.price-b.price);
  else if(state.sort==='desc') list=[...list].sort((a,b)=>b.price-a.price);

  metaEl.innerHTML='Показано <b>'+list.length+'</b> из '+ITEMS.length;
  emptyEl.style.display=list.length?'none':'block';

  grid.innerHTML = list.map(i=>`
    <article class="card">
      <div class="ph">
        <span class="badge">${i.supName.split(' ·')[0]}</span>
        <img loading="lazy" src="${imgUrl(i.id)}" alt="${i.desc}"
             onerror="this.onerror=null;this.src='${fallback(i.id)}'">
      </div>
      <div class="body">
        <div class="price">${fmt(i.price)} <span>₽</span></div>
        <p class="desc">${i.desc}</p>
      </div>
    </article>`).join('');
}
render();
</script>
</body>
</html>
